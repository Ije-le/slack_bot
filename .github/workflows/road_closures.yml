name: PG County Road Closures Bot

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch:      # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  check-closures:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests slack-sdk aiohttp

      - name: Run bot
        env:
          SLACK_API_TOKEN: ${{ secrets.SLACK_API_TOKEN }}
        run: python slack_bot.py

      - name: Save seen closures
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add seen.json
          git diff --staged --quiet || git commit -m "Update seen closures [skip ci]"
          git push
